<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Helaas!</title>
    <link rel="stylesheet" href="../css/lose.css">

</head>
<body>
 
    <div class="lose-box">
        <h1>❌ Helaas! ❌</h1>
        <p>Je hebt de escape room niet op tijd gehaald.</p>
 
        <p class="tijd">Jouw tijd: <span id="tijd"></span></p>
        <p class="limiet">Maximale tijd was 10 minuten</p>
 
        <a href="index.php" class="btn">Probeer opnieuw</a>
    </div>
 
    <script>
        // Tijd ophalen uit URL: lose.html?time=12:45
        const params = new URLSearchParams(window.location.search);
        const tijd = params.get("time") || "00:00";
        document.getElementById("tijd").textContent = tijd;
    </script>
 
</body>
</html>
