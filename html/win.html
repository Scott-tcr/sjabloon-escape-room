<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Gefeliciteerd!</title>
    <link rel="stylesheet" href="../css/win.css">
</head>
<body>
 
    <div class="win-box">
        <h1>🎉 Gefeliciteerd! 🎉</h1>
        <p>Je hebt de escape room uitgespeeld!</p>
 
        <p class="tijd">Jouw tijd: <span id="tijd"></span></p>
        <p class="limiet">Maximale tijd: 10 minuten</p>
 
        <a href="index.php" class="btn">Terug naar Home</a>
    </div>
 
    <script>
        // Tijd ophalen uit URL: win.html?time=08:32
        const params = new URLSearchParams(window.location.search);
        const tijd = params.get("time") || "00:00";
        document.getElementById("tijd").textContent = tijd;
    </script>
 
</body>
</html>
